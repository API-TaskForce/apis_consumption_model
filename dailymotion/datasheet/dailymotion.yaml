associated_saas: dailymotion
type: partial_saas
url: https://developers.dailymotion.com/reference/rate-limiting
syntax_version: 0.2
date: 2026-03-09

capacity:
  quota_videos_upload_standard:
    value: 15
    unit: videos
    period: 1 day # 24h
    window_type: rolling

  quota_duration_upload_standard:
    value: 10
    unit: hours
    period: 1 day
    window_type: rolling

  quota_videos_upload_premium:
    value: 96 # Default, can be increased by contacting Dailymotion
    unit: videos
    period: 1 day
    window_type: rolling

max_power:
  rate_videos_upload_standard:
    value: 15
    unit: videos
    period: 1 day
    
  rate_duration_upload_standard:
    value: 10
    unit: hours
    period: 1 day
    
  rate_videos_upload_premium:
    value: 96
    unit: videos
    period: 1 day

throttling: {}

policies:
  payload_limits:
    standard:
      max_duration_per_video: "2 hours"
      max_file_size_per_video: "4 GB"
    premium:
      max_duration_per_video: "Unlimited"
      max_file_size_per_video: "64 GB"

cooling_period:
  description: "24-hour suspension of upload privileges if upload limits are exceeded."

plans:
  standard:
    # description: "Includes Users, Standard Creators, Pro Trial, Pro Starter, Pro Advanced"
    price: 0
    billing_period: 1 month
    endpoints:
      uploads_videos:
        rate: rate_videos_upload_standard
        quota: quota_videos_upload_standard
      uploads_duration:
        rate: rate_duration_upload_standard
        quota: quota_duration_upload_standard

  premium:
    # description: "Includes Premium Creators, Pro Enterprise"
    price: custom
    billing_period: 1 month
    endpoints:
      uploads_videos:
        rate: rate_videos_upload_premium
        quota: quota_videos_upload_premium
