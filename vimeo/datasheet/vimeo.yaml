associated_saas: vimeo
type: partial_saas
url: https://developer.vimeo.com/guidelines/rate-limiting
syntax_version: 0.2
date: 2026-03-09

capacity:
  quota_requests_general_free:
    value: 25
    unit: requests
    period: 1 min
    window_type: fixed
  quota_requests_filtered_free:
    value: 50
    unit: requests
    period: 1 min
    window_type: fixed

  quota_requests_general_starter:
    value: 125
    unit: requests
    period: 1 min
    window_type: fixed
  quota_requests_filtered_starter:
    value: 250
    unit: requests
    period: 1 min
    window_type: fixed

  quota_requests_general_standard:
    value: 250
    unit: requests
    period: 1 min
    window_type: fixed
  quota_requests_filtered_standard:
    value: 500
    unit: requests
    period: 1 min
    window_type: fixed

  quota_requests_general_advanced:
    value: 750
    unit: requests
    period: 1 min
    window_type: fixed
  quota_requests_filtered_advanced:
    value: 1500
    unit: requests
    period: 1 min
    window_type: fixed

  quota_requests_general_enterprise:
    value: 2500
    unit: requests
    period: 1 min
    window_type: fixed
  quota_requests_filtered_enterprise:
    value: 5000
    unit: requests
    period: 1 min
    window_type: fixed

max_power:
  rate_requests_general_free:
    value: 25
    unit: requests
    period: 1 min
  rate_requests_filtered_free:
    value: 50
    unit: requests
    period: 1 min

  rate_requests_general_starter:
    value: 125
    unit: requests
    period: 1 min
  rate_requests_filtered_starter:
    value: 250
    unit: requests
    period: 1 min

  rate_requests_general_standard:
    value: 250
    unit: requests
    period: 1 min
  rate_requests_filtered_standard:
    value: 500
    unit: requests
    period: 1 min

  rate_requests_general_advanced:
    value: 750
    unit: requests
    period: 1 min
  rate_requests_filtered_advanced:
    value: 1500
    unit: requests
    period: 1 min

  rate_requests_general_enterprise:
    value: 2500
    unit: requests
    period: 1 min
  rate_requests_filtered_enterprise:
    value: 5000
    unit: requests
    period: 1 min

throttling: {}

policies:
  segmentation:
    - name: Unauthenticated Token
      description: "The end user is the owner of the app. All requests count as coming from this person. Cooldown kicks in if total requests exceed the quota corresponding to the app owner's membership level."
    - name: Authenticated Token (per user)
      description: "The end user is the person identified by the token. Each authenticated end user has their own independent quota, which doesn't impact any other user's quota."
    - name: Field Filtering
      description: "Field filtering effectively doubles the maximum rate. Use the `fields` query parameter to specify which data fields to return."

cooling_period:
  description: "Remainder of the current 60-second period. HTTP 429 (error code 9000) returned until X-RateLimit-Reset datetime."

plans:
  free:
    price: 0
    billing_period: 1 month
    endpoints:
      /*:
        general:
          rate: rate_requests_general_free
          quota: quota_requests_general_free
        filtered:
          rate: rate_requests_filtered_free
          quota: quota_requests_filtered_free

  starter:
    price: 8
    billing_period: 1 month
    endpoints:
      /*:
        general:
          rate: rate_requests_general_starter
          quota: quota_requests_general_starter
        filtered:
          rate: rate_requests_filtered_starter
          quota: quota_requests_filtered_starter

  standard:
    price: 19
    billing_period: 1 month
    endpoints:
      /*:
        general:
          rate: rate_requests_general_standard
          quota: quota_requests_general_standard
        filtered:
          rate: rate_requests_filtered_standard
          quota: quota_requests_filtered_standard

  advanced:
    price: 69
    billing_period: 1 month
    endpoints:
      /*:
        general:
          rate: rate_requests_general_advanced
          quota: quota_requests_general_advanced
        filtered:
          rate: rate_requests_filtered_advanced
          quota: quota_requests_filtered_advanced

  enterprise:
    price: custom
    billing_period: 1 month
    endpoints:
      /*:
        general:
          rate: rate_requests_general_enterprise
          quota: quota_requests_general_enterprise
        filtered:
          rate: rate_requests_filtered_enterprise
          quota: quota_requests_filtered_enterprise
